version: "3.9"

# ══════════════════════════════════════════════════════════════
#  docker-compose.yml — Локальне розгортання бота
# ══════════════════════════════════════════════════════════════

services:
  # ── Telegram Bot ──────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_news_bot
    restart: unless-stopped

    # Змінні середовища (з .env файлу)
    env_file:
      - .env

    # SQLite: монтуємо директорію для зберігання БД між перезапусками
    volumes:
      - bot_data:/app/data
      - ./bot.log:/app/bot.log  # логи доступні з хосту

    # Залежності (якщо використовуєте PostgreSQL)
    # depends_on:
    #   postgres:
    #     condition: service_healthy

    networks:
      - bot_network

  # ── PostgreSQL (опціонально) ──────────────────────────────────
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: bot_postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: botdb
  #     POSTGRES_USER: botuser
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U botuser -d botdb"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - bot_network

volumes:
  bot_data:
    driver: local
  # postgres_data:
  #   driver: local

networks:
  bot_network:
    driver: bridge
